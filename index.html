<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOL SKILL QUIZ PRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Spiegel:wght@400;700&display=swap');

        :root {
            --gold: #c8aa6e;
            --gold-bright: #f0e6d2;
            --gold-dark: #785a28;
            --blue-dark: #010a13;
            --blue-hextech: #0ac8b9;
            --red-error: #ff4e50;
            --green-success: #00ff88;
            --bg-dark: #091428;
        }

        body {
            background: radial-gradient(circle at center, var(--bg-dark) 0%, #010a13 100%);
            color: var(--gold-bright);
            font-family: 'Spiegel', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: rgba(1, 10, 19, 0.98);
            border: 1px solid var(--gold-dark);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 1);
            padding: 40px 30px;
            text-align: center;
            position: relative;
        }

        h2 {
            font-size: 1.6rem;
            letter-spacing: 12px;
            color: var(--gold);
            text-transform: uppercase;
            margin: 0 0 35px 0;
        }

        .skill-container {
            width: 110px;
            height: 110px;
            margin: 0 auto 30px;
            padding: 5px;
            background: linear-gradient(to bottom, var(--gold), var(--gold-dark));
            clip-path: polygon(20% 0, 80% 0, 100% 20%, 100% 80%, 80% 100%, 20% 100%, 0 80%, 0 20%);
        }

        .skill-inner {
            width: 100%; height: 100%; background: #000;
            clip-path: polygon(20% 0, 80% 0, 100% 20%, 100% 80%, 80% 100%, 20% 100%, 0 80%, 0 20%);
        }

        #skill-img {
            width: 100%; height: 100%; object-fit: cover;
            opacity: 0; transition: opacity 0.4s ease;
        }

        #status {
            height: 35px;
            font-weight: bold;
            letter-spacing: 3px;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .options-grid {
            display: grid; gap: 12px; margin: 20px 0;
        }

        button {
            background: linear-gradient(to bottom, #1e2328 0%, #111 100%);
            color: var(--gold);
            border: 1px solid var(--gold-dark);
            padding: 16px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease-out;
            letter-spacing: 1.5px;
        }

        button:hover:not(:disabled) {
            border-color: var(--gold-bright);
            color: var(--gold-bright);
            background: #2a2f35;
        }

        /* ผลลัพธ์: กรอบเขียว (ข้อที่ถูก) */
        button.reveal-correct {
            background: rgba(0, 255, 136, 0.2) !important;
            border: 2px solid var(--green-success) !important;
            color: var(--green-success) !important;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
            animation: bounceIn 0.4s ease;
            opacity: 1 !important;
        }

        /* ผลลัพธ์: กรอบแดง (ข้อที่เลือกผิด) */
        button.reveal-wrong {
            background: rgba(255, 78, 80, 0.2) !important;
            border: 2px solid var(--red-error) !important;
            color: var(--red-error) !important;
            box-shadow: 0 0 20px rgba(255, 78, 80, 0.3);
        }

        @keyframes bounceIn {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        #next-btn {
            width: 100%;
            padding: 18px;
            background: var(--blue-hextech);
            color: var(--blue-dark);
            border: none;
            font-weight: bold;
            display: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .score-board {
            display: flex; justify-content: space-around;
            margin-top: 40px; padding-top: 25px;
            border-top: 1px solid rgba(200, 170, 110, 0.1);
        }

        .score-val { font-size: 2.2rem; font-weight: 700; }
        .score-label { font-size: 10px; color: var(--gold-dark); text-transform: uppercase; letter-spacing: 2px; }

        .loader {
            width: 40px; height: 40px; border: 2px solid rgba(10, 200, 185, 0.1);
            border-top-color: var(--blue-hextech); border-radius: 50%;
            animation: spin 1s linear infinite; margin: 40px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container" id="main-card">
    <h2>LOL SKILL</h2>
    <div id="loader"><div class="loader"></div></div>
    <div id="game-ui" style="display:none;">
        <div class="skill-container">
            <div class="skill-inner"><img id="skill-img" src=""></div>
        </div>
        <div id="status"></div>
        <div class="options-grid" id="options"></div>
        <button id="next-btn" onclick="nextQuestion()">NEXT CHALLENGE</button>
        <div class="score-board">
            <div><span id="correct-count" class="score-val" style="color: var(--blue-hextech);">0</span><br><span class="score-label">CORRECT</span></div>
            <div><span id="wrong-count" class="score-val" style="color: var(--red-error);">0</span><br><span class="score-label">WRONG</span></div>
        </div>
    </div>
</div>

<script>
    const VERSION = "14.9.1";
    let champList = [];
    let allSkillNames = []; 
    let correctCount = 0;
    let wrongCount = 0;
    let currentSkillName = "";

    async function init() {
        try {
            const res = await fetch(`https://ddragon.leagueoflegends.com/cdn/${VERSION}/data/en_US/champion.json`);
            const data = await res.json();
            champList = Object.keys(data.data);
            
            for(let i=0; i<30; i++){
                const randomC = champList[Math.floor(Math.random() * champList.length)];
                allSkillNames.push(data.data[randomC].name); 
            }

            document.getElementById('loader').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            nextQuestion();
        } catch (e) { console.error("Load Error"); }
    }

    async function nextQuestion() {
        document.getElementById('status').innerText = "";
        document.getElementById('next-btn').style.display = "none";
        const img = document.getElementById('skill-img');
        img.style.opacity = "0";

        const randomChamp = champList[Math.floor(Math.random() * champList.length)];
        
        try {
            const res = await fetch(`https://ddragon.leagueoflegends.com/cdn/${VERSION}/data/en_US/champion/${randomChamp}.json`);
            const data = await res.json();
            const spells = data.data[randomChamp].spells;
            const spell = spells[Math.floor(Math.random() * spells.length)];
            
            currentSkillName = spell.name;
            img.src = `https://ddragon.leagueoflegends.com/cdn/${VERSION}/img/spell/${spell.image.full}`;
            img.onload = () => img.style.opacity = "1";

            let choices = new Set();
            choices.add(currentSkillName);
            
            while(choices.size < 4) {
                const fake = Math.random() > 0.5 ? champList[Math.floor(Math.random() * champList.length)] : allSkillNames[Math.floor(Math.random() * allSkillNames.length)];
                if(fake !== currentSkillName) choices.add(fake);
            }

            const finalChoices = Array.from(choices).sort(() => Math.random() - 0.5);
            const optDiv = document.getElementById('options');
            optDiv.innerHTML = "";

            finalChoices.forEach(c => {
                const btn = document.createElement('button');
                btn.innerText = c;
                // เก็บค่าจริงไว้ใน dataset เพื่อใช้เช็คตอนเฉลย
                btn.dataset.skill = c; 
                btn.onclick = () => checkResult(btn);
                optDiv.appendChild(btn);
            });

        } catch (e) { nextQuestion(); }
    }

    function checkResult(clickedBtn) {
        const selected = clickedBtn.dataset.skill;
        const btns = document.querySelectorAll('#options button');
        const statusEl = document.getElementById('status');
        
        btns.forEach(b => b.disabled = true);

        if(selected === currentSkillName) {
            clickedBtn.classList.add('reveal-correct');
            correctCount++;
            statusEl.innerText = "ACCESS GRANTED";
            statusEl.style.color = "var(--blue-hextech)";
        } else {
            // ผิด: ปุ่มที่คลิกเป็นแดง
            clickedBtn.classList.add('reveal-wrong');
            wrongCount++;
            statusEl.innerText = "ACCESS DENIED";
            statusEl.style.color = "var(--red-error)";
            
            // เฉลย: บังคับให้ข้อที่ถูกเป็นเขียว โดยเช็คจาก dataset ที่เราเก็บไว้
            btns.forEach(b => {
                if(b.dataset.skill === currentSkillName) {
                    b.classList.add('reveal-correct');
                }
            });
        }
        
        document.getElementById('correct-count').innerText = correctCount;
        document.getElementById('wrong-count').innerText = wrongCount;
        document.getElementById('next-btn').style.display = "block";
    }

    init();
</script>
</body>
</html>
