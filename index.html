<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOL SKILL QUIZ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Spiegel:wght@400;700&display=swap');

        :root {
            --gold: #c8aa6e;
            --gold-bright: #f0e6d2;
            --gold-dark: #785a28;
            --blue-dark: #010a13;
            --blue-hextech: #0ac8b9;
            --red-error: #ff4e50;
            --green-success: #00ff88;
            --bg-dark: #091428;
        }

        body {
            background: radial-gradient(circle at center, var(--bg-dark) 0%, #010a13 100%);
            color: var(--gold-bright);
            font-family: 'Spiegel', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: rgba(1, 10, 19, 0.98);
            border: 1px solid var(--gold-dark);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 1);
            padding: 40px 30px;
            text-align: center;
            position: relative;
        }

        h2 {
            font-size: 1.6rem;
            letter-spacing: 12px;
            color: var(--gold);
            text-transform: uppercase;
            margin: 0 0 35px 0;
        }

        .timer-container {
            width: 100%;
            height: 4px;
            background: #1e2328;
            margin-bottom: 20px;
            overflow: hidden;
        }
        #timer-bar {
            width: 100%;
            height: 100%;
            background: var(--blue-hextech);
        }

        .skill-container {
            width: 110px;
            height: 110px;
            margin: 0 auto 30px;
            padding: 5px;
            background: linear-gradient(to bottom, var(--gold), var(--gold-dark));
            clip-path: polygon(20% 0, 80% 0, 100% 20%, 100% 80%, 80% 100%, 20% 100%, 0 80%, 0 20%);
        }

        .skill-inner {
            width: 100%; height: 100%; background: #000;
            clip-path: polygon(20% 0, 80% 0, 100% 20%, 100% 80%, 80% 100%, 20% 100%, 0 80%, 0 20%);
        }

        #skill-img {
            width: 100%; height: 100%; object-fit: cover;
            opacity: 0; transition: opacity 0.4s ease;
        }

        #status {
            height: 35px;
            font-weight: bold;
            letter-spacing: 3px;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .options-grid {
            display: grid; gap: 12px; margin: 20px 0;
        }

        button {
            background: linear-gradient(to bottom, #1e2328 0%, #111 100%);
            color: var(--gold);
            border: 1px solid var(--gold-dark);
            padding: 16px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease-out;
            letter-spacing: 1.5px;
        }

        button:hover:not(:disabled) {
            border-color: var(--gold-bright);
            color: var(--gold-bright);
            background: #2a2f35;
        }

        button.reveal-correct {
            background: rgba(0, 255, 136, 0.2) !important;
            border: 2px solid var(--green-success) !important;
            color: var(--green-success) !important;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
            animation: bounceIn 0.4s ease;
            opacity: 1 !important;
        }

        button.reveal-wrong {
            background: rgba(255, 78, 80, 0.2) !important;
            border: 2px solid var(--red-error) !important;
            color: var(--red-error) !important;
            box-shadow: 0 0 20px rgba(255, 78, 80, 0.3);
        }

        @keyframes bounceIn {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        #next-btn {
            width: 100%;
            padding: 18px;
            background: var(--blue-hextech);
            color: var(--blue-dark);
            border: none;
            font-weight: bold;
            display: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .score-board {
            display: flex; justify-content: space-around;
            margin-top: 40px; padding-top: 25px;
            border-top: 1px solid rgba(200, 170, 110, 0.1);
        }

        .score-val { font-size: 2.2rem; font-weight: 700; }
        .score-label { font-size: 10px; color: var(--gold-dark); text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-screen">
        <h2>SELECT ROUNDS</h2>
        <div class="options-grid">
            <button onclick="startGame(10)">10 QUESTIONS</button>
            <button onclick="startGame(20)">20 QUESTIONS</button>
            <button onclick="startGame(50)">50 QUESTIONS</button>
        </div>
    </div>

    <div id="game-ui" style="display:none;">
        <div style="font-size: 10px; margin-bottom: 5px; color: var(--gold);">PROGRESS: <span id="current-q">1</span>/<span id="total-q">10</span></div>
        <div class="timer-container"><div id="timer-bar"></div></div>
        <div class="skill-container">
            <div class="skill-inner"><img id="skill-img" src=""></div>
        </div>
        <div id="status"></div>
        <div class="options-grid" id="options"></div>
        <button id="next-btn" onclick="nextQuestion()">NEXT CHALLENGE</button>
        <div class="score-board">
            <div><span id="correct-count" class="score-val" style="color: var(--blue-hextech);">0</span><br><span class="score-label">CORRECT</span></div>
            <div><span id="wrong-count" class="score-val" style="color: var(--red-error);">0</span><br><span class="score-label">WRONG</span></div>
        </div>
    </div>

    <div id="result-screen" style="display:none;">
        <h2>FINISHED</h2>
        <div class="score-val" id="final-score" style="font-size: 3.5rem; color: var(--gold);">0/0</div>
        <div id="rank-text" style="letter-spacing: 5px; margin-top: 10px;">RANK: UNKNOWN</div>
        <button onclick="location.reload()" style="width:100%; margin-top:30px;">PLAY AGAIN</button>
    </div>
</div>

<script>
    const VERSION = "14.9.1";
    let champList = [];
    let skillPool = []; 
    let correctCount = 0;
    let wrongCount = 0;
    let currentIdx = 0;
    let maxQuestions = 10;
    let currentSkillName = "";
    let timer;

    async function init() {
        try {
            const res = await fetch(`https://ddragon.leagueoflegends.com/cdn/${VERSION}/data/en_US/champion.json`);
            const data = await res.json();
            champList = Object.keys(data.data);
            
            const randomKeys = [...champList].sort(() => 0.5 - Math.random()).slice(0, 35);
            for(let key of randomKeys) {
                const cRes = await fetch(`https://ddragon.leagueoflegends.com/cdn/${VERSION}/data/en_US/champion/${key}.json`);
                const cData = await cRes.json();
                cData.data[key].spells.forEach(s => skillPool.push(s.name));
            }
        } catch (e) { console.error("Load Error"); }
    }

    function startGame(num) {
        maxQuestions = num;
        document.getElementById('total-q').innerText = num;
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        nextQuestion();
    }

    async function nextQuestion() {
        if(currentIdx >= maxQuestions) return showResults();
        currentIdx++;
        document.getElementById('current-q').innerText = currentIdx;
        document.getElementById('status').innerText = "LOADING SKILL..."; // บอกสถานะโหลดรูป
        document.getElementById('next-btn').style.display = "none";
        
        const bar = document.getElementById('timer-bar');
        bar.style.width = "100%"; // รีเซ็ตแถบเวลาก่อนเริ่ม
        
        const img = document.getElementById('skill-img');
        img.style.opacity = "0";

        const randomChamp = champList[Math.floor(Math.random() * champList.length)];
        try {
            const res = await fetch(`https://ddragon.leagueoflegends.com/cdn/${VERSION}/data/en_US/champion/${randomChamp}.json`);
            const data = await res.json();
            const spell = data.data[randomChamp].spells[Math.floor(Math.random() * 4)];
            currentSkillName = spell.name;
            
            img.src = `https://ddragon.leagueoflegends.com/cdn/${VERSION}/img/spell/${spell.image.full}`;
            
            // รอให้รูปโหลดเสร็จก่อนค่อยเริ่มนับเวลาและโชว์ตัวเลือก
            img.onload = () => {
                img.style.opacity = "1";
                document.getElementById('status').innerText = "";
                startTimer();
            };

            let choices = new Set([currentSkillName]);
            while(choices.size < 4) { choices.add(skillPool[Math.floor(Math.random() * skillPool.length)]); }

            const optDiv = document.getElementById('options');
            optDiv.innerHTML = "";
            Array.from(choices).sort(() => Math.random() - 0.5).forEach(c => {
                const btn = document.createElement('button');
                btn.innerText = c;
                btn.dataset.skill = c; 
                btn.onclick = () => checkResult(btn);
                optDiv.appendChild(btn);
            });
        } catch (e) { nextQuestion(); }
    }

    function startTimer() {
        clearInterval(timer);
        const bar = document.getElementById('timer-bar');
        let width = 100;
        // ปรับเป็น 5.5 วินาที (5500ms)
        // ทำงานทุกๆ 55ms เพื่อลดความกว้างทีละ 1% (รวม 100 ครั้ง = 5500ms)
        timer = setInterval(() => {
            width -= 1;
            bar.style.width = width + "%";
            if(width <= 0) { clearInterval(timer); checkResult(null); }
        }, 55);
    }

    function checkResult(clickedBtn) {
        clearInterval(timer);
        const btns = document.querySelectorAll('#options button');
        const statusEl = document.getElementById('status');
        btns.forEach(b => b.disabled = true);

        const isCorrect = clickedBtn && clickedBtn.dataset.skill === currentSkillName;

        if(isCorrect) {
            clickedBtn.classList.add('reveal-correct');
            correctCount++;
            statusEl.innerText = "PERFECT EXECUTION";
            statusEl.style.color = "var(--blue-hextech)";
        } else {
            if(clickedBtn) clickedBtn.classList.add('reveal-wrong');
            wrongCount++;
            statusEl.innerText = clickedBtn ? "OUTPLAYED" : "REACTION FAILED";
            statusEl.style.color = "var(--red-error)";
            
            // แสดงกรอบเขียวในข้อที่ถูกเสมอ
            btns.forEach(b => {
                if(b.dataset.skill === currentSkillName) b.classList.add('reveal-correct');
            });
        }
        
        document.getElementById('correct-count').innerText = correctCount;
        document.getElementById('wrong-count').innerText = wrongCount;
        document.getElementById('next-btn').style.display = "block";
    }

    function showResults() {
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = `${correctCount}/${maxQuestions}`;
        const rate = (correctCount/maxQuestions) * 100;
        let rank = rate >= 90 ? "CHALLENGER" : rate >= 70 ? "DIAMOND" : rate >= 40 ? "GOLD" : "IRON";
        document.getElementById('rank-text').innerText = "RANK: " + rank;
    }

    init();
</script>
</body>
</html>
